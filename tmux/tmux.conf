# tmux — read from ~/.config/tmux/tmux.conf (tmux 3.1+).

# Prefix: Ctrl-a (easier than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Sane defaults
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g renumber-windows on

# Start indexes at 1
set -g base-index 1
setw -g pane-base-index 1

# vi keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Splits keep the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar — minimal
set -g status-position top
set -g status-style "bg=default fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=white]%H:%M #[fg=cyan]%d-%b "
set -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W "
set -g window-status-format " #I:#W "
